services:
  json-server:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: npx -y json-server --watch db.json --host 0.0.0.0 --port 3000
    ports:
      - "3000:3000"

  # Aplicação Angular (build de produção servida pelo Nginx)
  # Roda por padrão com: docker compose up
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - json-server

  # Desenvolvimento com hot reload — apenas para desenvolvimento local
  # Rodar com: docker compose --profile dev up
  dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npx ng serve --host 0.0.0.0 --poll 500"
    ports:
      - "4200:4200"
    depends_on:
      - json-server
    profiles:
      - dev
  # Execução de Testes Unitários e Cobertura
  # Rodar com: docker compose run --rm test
  test:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm test -- --watch=false --coverage"
    profiles:
      - test
