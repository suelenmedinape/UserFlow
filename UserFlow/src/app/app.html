<mat-toolbar class="toolbar-gray">
  <button mat-icon-button class="burger-white" aria-label="Abrir menu">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="title-white">USUÁRIOS</span>

  <mat-form-field appearance="outline" class="custom-search" subscriptSizing="dynamic">
    <mat-icon matPrefix>search</mat-icon>
    <input matInput type="text" placeholder="Pesquisar..." [formControl]="searchControl" />
  </mat-form-field>

  <span class="spacer"></span>
</mat-toolbar>

<main class="content-background">
  <div class="page-container">
    <h2 class="section-title">Usuários cadastrados</h2>

    <app-users-component [searchControl]="searchControl"></app-users-component>
  </div>
</main>

<button mat-fab class="fab-button" aria-label="Adicionar usuário" (click)="openAddUserModal()">
  <mat-icon>add</mat-icon>
</button>
